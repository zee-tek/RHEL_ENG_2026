---
- name: Setup WebServer
  hosts: test
  gather_facts: false
  tasks:
    - name: Install httpd package
      dnf:
        name:
          - httpd
          - firewalld
        state: present

    - name: start service httpd
      service:
        name: "{{item}}"
        state: started
        enabled: yes
      loop:
        - httpd
        - firewalld
   
 
    - name: Add http service in firewall rule
      firewalld:
        service: http
        state: enabled
        permanent: yes
        immediate: yes

    - name: Copy web content
      copy:
        content: "Learning RHCE"
      dest: /var/www/html/index.html
